name: VPS

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Update
        run: sudo apt update

      - name: Install SSH
        run: sudo apt install -y openssh-server

      - name: Set root password
        run: echo "root:123456" | sudo chpasswd

      - name: Start SSH
        run: sudo service ssh start

      - name: Install ngrok
        run: |
         sudo apt install -y ngrok
          
      - name: Auth ngrok
        run: ./ngrok config add-authtoken 2Leb0wEveVWkYQfaLerAJiuehFu_3EG9BmVTbGt7hFCHvvRWz

      - name: Start tunnel
        run: ./ngrok tcp 22
